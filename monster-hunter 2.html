var seen={};
M=M.filter(function(m){if(seen[m.id])return false;seen[m.id]=true;return true;});

var allG=[...new Set(M.flatMap(function(m){return m.jeux;}))].sort();
var allTy=[...new Set(M.map(function(m){return m.type;}))].sort();
var gs=document.getElementById("fG");var ts=document.getElementById("fTy");
var og=document.createElement("option");og.value="all";og.textContent="Tous les jeux";gs.appendChild(og);
allG.forEach(function(g){var o=document.createElement("option");o.value=g;o.textContent=g;gs.appendChild(o);});
var ot=document.createElement("option");ot.value="all";ot.textContent="Tous les types";ts.appendChild(ot);
allTy.forEach(function(t){var o=document.createElement("option");o.value=t;o.textContent=t;ts.appendChild(o);});

var cur=M.slice();
function af(){
  var s=document.getElementById("sI").value.toLowerCase();
  var ti=document.getElementById("fT").value;
  var ga=document.getElementById("fG").value;
  var ty=document.getElementById("fTy").value;
  cur=M.filter(function(m){
    var ok=m.name.toLowerCase().indexOf(s)>=0||m.type.toLowerCase().indexOf(s)>=0||m.element.toLowerCase().indexOf(s)>=0;
    return ok&&(ti==="all"||m.tier===ti)&&(ga==="all"||m.jeux.indexOf(ga)>=0)&&(ty==="all"||m.type===ty);
  });
  rg();
}
function rg(){
  var g=document.getElementById("mg");var e=document.getElementById("es");
  document.getElementById("rc").textContent=cur.length+" monstre"+(cur.length>1?"s":"");
  if(!cur.length){g.innerHTML="";e.style.display="block";return;}
  e.style.display="none";
  g.innerHTML=cur.map(function(m,i){
    var t=T[m.tier];var k=kills[m.id]||0;
    return '<div class="mc" onclick="om('+m.id+')" style="border:1px solid '+t.c+'30;animation-delay:'+(i*0.02)+'s">'
      +'<div class="cs" style="background:linear-gradient(90deg,transparent,'+t.c+',transparent)"></div>'
      +(k>0?'<div class="kb">💀 '+k+'</div>':'')
      +'<span class="ci">'+m.icon+'</span>'
      +'<div class="cn">'+m.name+'</div>'
      +'<div class="ct">'+m.type+'</div>'
      +'<div class="cb">'
      +'<span class="badge" style="background:'+t.b+';color:'+t.c+';border:1px solid '+t.c+'44">'+t.l+'</span>'
      +'<span class="badge" style="background:rgba(255,100,30,0.1);color:#ff8844;border:1px solid rgba(255,100,30,0.3)">⚡ '+m.element+'</span>'
      +'</div></div>';
  }).join("");
}
function om(id){
  var m=null;for(var i=0;i<M.length;i++)if(M[i].id===id){m=M[i];break;}
  if(!m)return;
  var t=T[m.tier];var k=kills[m.id]||0;
  document.getElementById("mst2").style.background="linear-gradient(90deg,transparent,"+t.c+",transparent)";
  document.getElementById("mbox").style.boxShadow="0 0 60px "+t.c+"22";
  document.getElementById("mico").textContent=m.icon;
  document.getElementById("mname").textContent=m.name;
  document.getElementById("mmeta").textContent=m.type+" — "+t.l;
  document.getElementById("mdesc").textContent=m.desc;
  var fw=m.fw.map(function(f){return '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="font-size:13px;color:'+ec(f.e)+';font-family:Cinzel,serif">'+f.e+'</span><span style="color:#ffaa44;font-size:12px">'+st(f.n)+'</span></div>';}).join("");
  var zo=m.zones.map(function(z){return '<span class="zp">'+z.i+' '+z.n+'</span>';}).join("");
  var je=m.jeux.map(function(j){return '<span class="gp">'+j+'</span>';}).join("");
  var ar=m.armures.map(function(a){return '<div class="ai">'+a.n+' <em style="color:#ffaa44;font-size:11px">['+a.t+']</em><span>'+a.b+'</span></div>';}).join("");
  document.getElementById("mcont").innerHTML=
    '<div class="st">💀 Monstres tués</div>'
    +'<div class="kc"><div><div class="kd" id="kd'+m.id+'">'+k+'</div><div class="kl">TUÉS</div></div>'
    +'<div class="kbs"><button class="kb2 km" onclick="uk('+m.id+',-1,event)">−</button>'
    +'<button class="kb2 kp" onclick="uk('+m.id+',1,event)">+</button>'
    +'<button class="kr" onclick="uk('+m.id+',0,event)">RAZ</button></div></div>'
    +'<div class="st">⚡ Faiblesses élémentaires</div>'
    +'<div class="mst"><div class="sb"><div class="sl">Élément</div><div class="sv" style="color:'+ec(m.element)+'">'+m.element+'</div></div>'
    +'<div class="sb"><div class="sl">Faiblesses</div><div style="margin-top:4px">'+fw+'</div></div></div>'
    +'<div class="st">🗺️ Zones de chasse</div><div class="zl">'+zo+'</div>'
    +'<div class="st">🎮 Apparitions dans la série</div><div class="gl">'+je+'</div>'
    +'<div class="st">🛡️ Armures craftables</div><div class="al">'+ar+'</div>';
  document.getElementById("mo").classList.add("open");
  document.body.style.overflow="hidden";
}
function uk(id,val,event){
  event.stopPropagation();
  kills[id]=val===0?0:Math.max(0,(kills[id]||0)+val);
  sk();
  var d=document.getElementById("kd"+id);
  if(d){d.textContent=kills[id];d.style.transform="scale(1.3)";setTimeout(function(){d.style.transform="scale(1)";},150);}
  rg();
}
function cm(e){if(e.target===document.getElementById("mo"))cmd();}
function cmd(){document.getElementById("mo").classList.remove("open");document.body.style.overflow="";}
document.addEventListener("keydown",function(e){if(e.key==="Escape")cmd();});
rg();
</script>
